<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="1px" cellspacing ="13px" cellpadding="13px" bgcolor="yellow">
        <thead align="centre" bgcolor="blue">
        <tr>
            <th>name</th>
            <th>course</th>
            <th>city</th>
        </tr>
        </thead>
        <tbody align="centre" bgcolor="green">
        <tr>
            <th>nikhil</th>
            <th>web development</th>
            <th>hyd</th>
        </tr>
        <tr>
            <th>uday</th>
            <th>dev</th>
            <th>khamam</th>
        </tr>
        </tbody>
    </table>
    <!-- th stands for table heading 
    tr stands for table rows 
    border adds borders to table in terms of px (pexels)
    cellspacing = space between each cell/ box
    cellpadding = space inside the box/ cell arount the content -->
</body>
</html>
