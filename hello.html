<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scrolling Effects Project</title>

<style>

/* Smooth Scrolling */
html{
    scroll-behavior:smooth;
}

/* Body Style */
body{
    margin:0;
    font-family:Arial,sans-serif;
}

/* Sticky Header */
header{
    position:sticky;
    top:0;
    background:#222;
    color:white;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:15px;
}

/* Sections */
section{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-size:30px;
    color:white;
}

/* Different Section Colors */
#home{
    background:#f4a261;
}

#about{
    background:#2a9d8f;
}

#services{
    background:#264653;
}

#contact{
    background:#e76f51;
}

/* Parallax Effect */
.parallax{
    background-image:url('https://picsum.photos/1200/800');
    height:100vh;
    background-attachment:fixed;
    background-position:center;
    background-repeat:no-repeat;
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:40px;
}

/* Hover Animation */
.card{
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    transition:0.5s;
}

.card:hover{
    transform:scale(1.1);
}

/* Fade Animation */
.fade{
    animation:fadeIn 2s;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

button{
    padding:10px 20px;
    border:none;
    background:black;
    color:white;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- Header -->
<header>
    <h2>Scrolling Effects Website</h2>

    <nav>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<!-- Home Section -->
<section id="home" class="fade">
    <div class="card">
        <h1>Welcome</h1>
        <p>Smooth Scrolling Example</p>
        <button>Explore</button>
    </div>
</section>

<!-- About Section -->
<section id="about">
    <div class="card">
        <h1>About Us</h1>
        <p>This section demonstrates scroll effects using CSS.</p>
    </div>
</section>

<!-- Parallax Section -->
<div class="parallax">
    Parallax Effect
</div>

<!-- Services Section -->
<section id="services">
    <div class="card">
        <h1>Our Services</h1>
        <p>Hover over this card</p>
    </div>
</section>

<!-- Contact Section -->
<section id="contact">
    <div class="card">
        <h1>Contact Us</h1>
        <p>Sticky Header Example</p>
    </div>
</section>

</body>
</html>
